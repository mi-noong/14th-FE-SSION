<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김승언 프로필</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">

    <!-- 요약 카드: 세로 배치, 작은 카드 -->
    <article class="profile-card">
      <img
        class="profile-card__photo"
        src="profile.png"
        alt="김승언 프로필 사진"
      />
      <div class="profile-card__info">
        <h2 class="profile-card__name">김승언</h2>
        <p class="profile-card__role">Frontend</p>
        <p class="profile-card__bio">열심히 배우는 프론트엔드 개발자입니다.</p>
      </div>
    </article>

    <!-- 상세 프로필: 흰색 카드 배경 -->
    <section class="profile-detail">

      <header class="profile-detail__header">
        <h1 class="profile-detail__name">김승언</h1>
        <p class="profile-detail__role">Frontend</p>
        <p class="profile-detail__track">LION TRACK</p>
      </header>

      <section class="profile-detail__section">
        <h3 class="section-title">자기소개</h3>
        <p class="section-body">초보 개발자입니다. 열심히 배우겠습니다!</p>
      </section>

      <section class="profile-detail__section">
        <h3 class="section-title">연락처</h3>
        <ul class="bullet-list">
          <li>Phone: 010-3097-2405</li>
          <li>Email: eoniseung0430@gmail.com</li>
        </ul>
      </section>

      <section class="profile-detail__section">
        <h3 class="section-title">관심 기술</h3>
        <ul class="bullet-list">
          <li>HTML</li>
          <li>CSS</li>
          <li>JavaScript</li>
        </ul>
      </section>

      <section class="profile-detail__section">
        <h3 class="section-title">한 마디</h3>
        <p class="section-body">열심히 배워서 팀에 도움이 되는 개발자가 되고 싶습니다!</p>
      </section>

    </section>

  </main>
</body>
</html>
